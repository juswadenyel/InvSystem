<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvSystem — Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-left">
            <div class="login-brand">
                <span class="brand-icon-big">📦</span>
                <h1>InvSystem</h1>
                <p>Smart Inventory Management</p>
            </div>
        </div>

        <div class="login-right">
            <div class="login-box">
                <h2>Welcome Back</h2>
                <p class="login-sub">Sign in to manage your inventory</p>

                <div id="loginError" class="error-msg hidden"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" placeholder="admin@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './js/config/supabase.js'
        import { login } from './js/modules/auth.js'
        import { getUser } from './js/modules/auth.js'

        // Redirect if already logged in
        const user = await getUser()
        if (user) window.location.href = 'dashboard.html'

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault()
            const btn = document.getElementById('loginBtn')
            const errorDiv = document.getElementById('loginError')
            btn.textContent = 'Signing in...'
            btn.disabled = true
            errorDiv.classList.add('hidden')

            try {
                await login(
                    document.getElementById('loginEmail').value,
                    document.getElementById('loginPassword').value
                )
                window.location.href = 'dashboard.html'
            } catch (err) {
                errorDiv.textContent = 'Invalid email or password'
                errorDiv.classList.remove('hidden')
                btn.textContent = 'Sign In'
                btn.disabled = false
            }
        })
    </script>
</body>
</html>
